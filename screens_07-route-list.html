<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>野径 · 路线库</title>
  <style>
:root {
  --bg: #ffffff; --surface: #f5f5f7; --fg: #1d1d1f; --muted: #6e6e73;
  --border: #d2d2d7; --border-soft: #e8e8ed; --accent: #0071e3; --accent-on: #ffffff;
  --success: #16a34a; --warn: #eab308;
  --font-display: "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body: "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --text-xs: 12px; --text-sm: 14px; --text-base: 17px; --text-lg: 21px;
  --radius-md: 12px; --radius-lg: 18px; --radius-pill: 980px;
  --elev-raised: 0 12px 32px rgba(0,0,0,0.08);
  --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-5: 20px;
}
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: var(--text-base)/1.47 var(--font-body); background: var(--bg); color: var(--fg); }
    .app {
      max-width: 390px; min-height: 844px; margin: 0 auto;
      padding: env(safe-area-inset-top, 12px) var(--space-4) env(safe-area-inset-bottom, 24px);
      display: flex; flex-direction: column; gap: var(--space-4);
    }
    h1 { font: 600 var(--text-lg)/1.2 var(--font-display); letter-spacing: -0.015em; padding-top: var(--space-2); }
    .search {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4); background: var(--surface);
      border-radius: var(--radius-md); border: 1px solid var(--border-soft);
    }
    .search input { flex: 1; border: 0; background: none; font: var(--text-base)/1.47 var(--font-body); outline: none; }
    .search input::placeholder { color: var(--muted); }
    .filters { display: flex; gap: var(--space-2); overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: var(--space-2) var(--space-3); border-radius: var(--radius-pill);
      border: 1px solid var(--border); background: var(--bg); font-size: var(--text-sm); cursor: pointer; min-height: 36px;
    }
    .chip.on { border-color: var(--accent); color: var(--accent); background: color-mix(in oklab, var(--accent), transparent 94%); }
    .list { display: flex; flex-direction: column; gap: var(--space-3); flex: 1; }
    .route-card {
      display: grid; grid-template-columns: 88px 1fr auto; gap: var(--space-3); align-items: center;
      padding: var(--space-3); border: 1px solid var(--border-soft); border-radius: var(--radius-lg); cursor: pointer;
      transition: box-shadow 150ms;
    }
    .route-card:hover { box-shadow: var(--elev-raised); }
    .route-card.hidden { display: none; }
    .thumb {
      width: 88px; height: 72px; border-radius: var(--radius-md);
      background: linear-gradient(145deg, #3d5a45, #1a2e22); position: relative; overflow: hidden;
    }
    .thumb svg { position: absolute; inset: 8px; width: calc(100% - 16px); height: calc(100% - 16px); }
    .route-card h3 { font: 600 var(--text-base)/1.3 var(--font-body); }
    .route-card p { font-size: var(--text-sm); color: var(--muted); margin-top: 2px; }
    .status-badge {
      font: 600 var(--text-xs)/1 var(--font-body); padding: 4px 8px; border-radius: var(--radius-pill);
    }
    .status-badge.done { background: color-mix(in oklab, var(--success), transparent 90%); color: var(--success); }
    .status-badge.active { background: color-mix(in oklab, var(--accent), transparent 92%); color: var(--accent); }
    .status-badge.draft { background: var(--surface); color: var(--muted); }
    .fab {
      position: sticky; bottom: var(--space-4); width: 100%; min-height: 50px; border: 0;
      border-radius: var(--radius-pill); background: var(--accent); color: var(--accent-on);
      font: 600 var(--text-base)/1 var(--font-body); cursor: pointer; box-shadow: var(--elev-raised);
    }
    .tabbar {
      display: flex; justify-content: space-around; padding: var(--space-3) 0;
      border-top: 1px solid var(--border-soft); margin-top: auto;
    }
    .tabbar button { background: none; border: 0; font: 600 var(--text-xs)/1 var(--font-body); color: var(--muted); min-height: 44px; cursor: pointer; }
    .tabbar button.active { color: var(--accent); }
  </style>
</head>
<body>
  <div class="app">
    <h1>路线库</h1>
    <label class="search">
      <span aria-hidden="true">🔍</span>
      <input type="search" placeholder="搜索路线名称或地点" id="search" />
    </label>
    <div class="filters" role="tablist">
      <button type="button" class="chip on" data-filter="all">全部</button>
      <button type="button" class="chip" data-filter="active">进行中</button>
      <button type="button" class="chip" data-filter="done">已完成</button>
      <button type="button" class="chip" data-filter="draft">草稿</button>
    </div>
    <div class="list" id="list">
      <article class="route-card" data-status="active">
        <div class="thumb"><svg viewBox="0 0 60 40"><path d="M5 35 Q25 20 55 8" fill="none" stroke="#0071e3" stroke-width="2"/></svg></div>
        <div><h3>雾凇岭环线</h3><p>4.2 km · 2 补给 · 记录中</p></div>
        <span class="status-badge active">进行中</span>
      </article>
      <article class="route-card" data-status="done">
        <div class="thumb" style="background:linear-gradient(145deg,#5c4a3a,#2a2218)"><svg viewBox="0 0 60 40"><path d="M5 35 Q25 20 55 8" fill="none" stroke="#0071e3" stroke-width="2"/></svg></div>
        <div><h3>西湖群山 · 九溪至龙井</h3><p>12.8 km · 6 标记 · 昨天</p></div>
        <span class="status-badge done">已完成</span>
      </article>
      <article class="route-card" data-status="done">
        <div class="thumb"><svg viewBox="0 0 60 40"><path d="M5 35 Q25 20 55 8" fill="none" stroke="#0071e3" stroke-width="2"/></svg></div>
        <div><h3>莫干山古道 · 单日</h3><p>18.1 km · 9 美照 · 3月28日</p></div>
        <span class="status-badge done">已完成</span>
      </article>
      <article class="route-card" data-status="draft">
        <div class="thumb" style="background:var(--surface)"></div>
        <div><h3>天目山 · 西线（规划中）</h3><p>未记录 · 已设起终点</p></div>
        <span class="status-badge draft">草稿</span>
      </article>
    </div>
    <button type="button" class="fab">规划新路线</button>
    <nav class="tabbar" aria-label="主导航">
      <button type="button">首页</button>
      <button type="button" class="active" aria-current="page">路线</button>
      <button type="button">地图</button>
      <button type="button">我的</button>
    </nav>
  </div>
  <script>
    document.querySelectorAll('.chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        document.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('on'); });
        chip.classList.add('on');
        var f = chip.dataset.filter;
        document.querySelectorAll('.route-card').forEach(function (card) {
          card.classList.toggle('hidden', f !== 'all' && card.dataset.status !== f);
        });
      });
    });
    document.getElementById('search').addEventListener('input', function (e) {
      var q = e.target.value.toLowerCase();
      document.querySelectorAll('.route-card').forEach(function (card) {
        var text = card.textContent.toLowerCase();
        card.style.display = text.includes(q) ? '' : 'none';
      });
    });
  </script>
</body>
</html>
