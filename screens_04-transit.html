<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>野径 · 如何到达</title>
  <style>
:root {
  --bg: #ffffff;
  --surface: #f5f5f7;
  --fg: #1d1d1f;
  --fg-2: #424245;
  --muted: #6e6e73;
  --meta: #86868b;
  --border: #d2d2d7;
  --border-soft: #e8e8ed;
  --accent: #0071e3;
  --accent-on: #ffffff;
  --accent-hover: #0077ed;
  --accent-active: #0066cc;
  --success: #16a34a;
  --font-display: "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-body: "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
  --font-mono: "SF Mono", ui-monospace, Menlo, monospace;
  --text-xs: 12px;
  --text-sm: 14px;
  --text-base: 17px;
  --text-lg: 21px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-pill: 980px;
  --elev-raised: 0 12px 32px rgba(0, 0, 0, 0.08);
  --focus-ring: 0 0 0 4px color-mix(in oklab, var(--accent), transparent 65%);
  --motion-fast: 150ms;
  --ease-standard: cubic-bezier(0.28, 0, 0.22, 1);
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
}
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: var(--text-base)/1.47 var(--font-body);
      background: var(--bg);
      color: var(--fg);
    }
    .app {
      max-width: 390px;
      min-height: 844px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 12px) var(--space-4) env(safe-area-inset-bottom, 24px);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }
    h1 {
      font: 600 var(--text-lg)/1.2 var(--font-display);
      letter-spacing: -0.015em;
      padding-top: var(--space-2);
    }
    .sub { color: var(--muted); font-size: var(--text-sm); }
    .endpoint-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-2);
      background: var(--surface);
      padding: 4px;
      border-radius: var(--radius-lg);
    }
    .endpoint-toggle button {
      min-height: 44px;
      border: 0;
      border-radius: var(--radius-md);
      background: transparent;
      font: 600 var(--text-base)/1 var(--font-body);
      color: var(--muted);
      cursor: pointer;
    }
    .endpoint-toggle button.active {
      background: var(--bg);
      color: var(--fg);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .place-card {
      padding: var(--space-4);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-lg);
      background: var(--surface-warm, #fbfbfd);
    }
    .place-card .label {
      font-size: var(--text-xs);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .place-card h2 {
      font: 600 var(--text-lg)/1.25 var(--font-display);
      margin: var(--space-2) 0;
      letter-spacing: -0.015em;
    }
    .coords {
      font: var(--text-sm)/1.4 var(--font-mono);
      color: var(--meta);
      font-variant-numeric: tabular-nums;
    }
    .routes { display: flex; flex-direction: column; gap: var(--space-3); }
    .route-opt {
      display: flex;
      align-items: flex-start;
      gap: var(--space-4);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: border-color var(--motion-fast) var(--ease-standard);
      min-height: 44px;
    }
    .route-opt:hover { border-color: var(--accent); }
    .route-opt.selected { border-color: var(--accent); background: color-mix(in oklab, var(--accent), transparent 96%); }
    .route-opt .icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-md);
      background: var(--surface);
      display: grid;
      place-items: center;
      font: 600 var(--text-sm)/1 var(--font-body);
      color: var(--accent);
      flex-shrink: 0;
    }
    .route-opt h3 { font: 600 var(--text-base)/1.3 var(--font-body); }
    .route-opt p { font-size: var(--text-sm); color: var(--muted); margin-top: 2px; }
    .route-opt .eta {
      margin-left: auto;
      text-align: right;
      font: 600 var(--text-sm)/1.3 var(--font-body);
      font-variant-numeric: tabular-nums;
      color: var(--fg);
    }
    .btn-open {
      width: 100%;
      min-height: 50px;
      margin-top: auto;
      border: 0;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: var(--accent-on);
      font: 600 var(--text-base)/1 var(--font-body);
      cursor: pointer;
    }
    .btn-open:hover { background: var(--accent-hover); }
    .btn-open:focus-visible { outline: none; box-shadow: var(--focus-ring); }
    .hidden-panel { display: none; }
    .hidden-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <h1>如何到达</h1>
    <p class="sub">雾凇岭环线 · 根据你的当前位置规划</p>

    <div class="endpoint-toggle" role="tablist">
      <button type="button" class="active" id="tab-start" role="tab" aria-selected="true">徒步起点</button>
      <button type="button" id="tab-end" role="tab" aria-selected="false">徒步终点</button>
    </div>

    <div id="panel-start" class="hidden-panel active">
      <div class="place-card">
        <span class="label">起点</span>
        <h2>雾凇岭停车场 P2</h2>
        <p class="coords">30.2841°N · 119.7128°E</p>
      </div>
    </div>
    <div id="panel-end" class="hidden-panel">
      <div class="place-card">
        <span class="label">终点</span>
        <h2>九溪公交站（环线出口）</h2>
        <p class="coords">30.1988°N · 120.1184°E</p>
      </div>
    </div>

    <section class="routes" aria-label="交通方式">
      <div class="route-opt selected" tabindex="0" data-mode="drive">
        <div class="icon">车</div>
        <div>
          <h3>驾车</h3>
          <p>经留泗路 · 景区北路</p>
        </div>
        <span class="eta" data-start="38 分" data-end="52 分">38 分</span>
      </div>
      <div class="route-opt" tabindex="0" data-mode="transit">
        <div class="icon">巴</div>
        <div>
          <h3>公交 + 步行</h3>
          <p>地铁 3 号线 · 转 319 路</p>
        </div>
        <span class="eta" data-start="1h 12 分" data-end="1h 28 分">1h 12 分</span>
      </div>
      <div class="route-opt" tabindex="0" data-mode="rideshare">
        <div class="icon">拼</div>
        <div>
          <h3>网约车到路口</h3>
          <p>再步行 1.2 km 至起点</p>
        </div>
        <span class="eta" data-start="45 分" data-end="—">45 分</span>
      </div>
    </section>

    <button type="button" class="btn-open" id="open-maps">在地图中打开导航</button>
  </div>
  <script>
    (function () {
      var isStart = true;
      var openBtn = document.getElementById('open-maps');
      var tabStart = document.getElementById('tab-start');
      var tabEnd = document.getElementById('tab-end');
      var panelStart = document.getElementById('panel-start');
      var panelEnd = document.getElementById('panel-end');

      function updateEta() {
        document.querySelectorAll('.route-opt .eta').forEach(function (el) {
          el.textContent = isStart ? el.dataset.start : el.dataset.end;
        });
        openBtn.textContent = isStart ? '导航至徒步起点' : '导航至徒步终点';
      }

      tabStart.addEventListener('click', function () {
        isStart = true;
        tabStart.classList.add('active');
        tabEnd.classList.remove('active');
        tabStart.setAttribute('aria-selected', 'true');
        tabEnd.setAttribute('aria-selected', 'false');
        panelStart.classList.add('active');
        panelEnd.classList.remove('active');
        updateEta();
      });
      tabEnd.addEventListener('click', function () {
        isStart = false;
        tabEnd.classList.add('active');
        tabStart.classList.remove('active');
        tabEnd.setAttribute('aria-selected', 'true');
        tabStart.setAttribute('aria-selected', 'false');
        panelEnd.classList.add('active');
        panelStart.classList.remove('active');
        updateEta();
      });

      document.querySelectorAll('.route-opt').forEach(function (opt) {
        opt.addEventListener('click', function () {
          document.querySelectorAll('.route-opt').forEach(function (o) { o.classList.remove('selected'); });
          opt.classList.add('selected');
        });
      });

      openBtn.addEventListener('click', function () {
        var dest = isStart ? '雾凇岭停车场 P2' : '九溪公交站';
        openBtn.textContent = '正在打开「地图」…';
        setTimeout(function () {
          openBtn.textContent = isStart ? '导航至徒步起点' : '导航至徒步终点';
        }, 1400);
      });
      updateEta();
    })();
  </script>
</body>
</html>
